- name: Create SSL cert directory
  file:
    path: /etc/ssl/bopen.bond
    state: directory
    owner: root
    group: root
    mode: '0755'
  become: yes

- name: Copy fullchain cert
  copy:
    src: /etc/ssl/bopen.bond/fullchain.cer
    dest: /etc/ssl/bopen.bond/fullchain.cer
    owner: root
    group: root
    mode: '0644'
  become: yes

- name: Copy private key
  copy:
    src: /etc/ssl/bopen.bond/cert.key
    dest: /etc/ssl/bopen.bond/cert.key
    owner: root
    group: root
    mode: '0600'
  become: yes
  notify: reload caddy-selfsteal

- name: Copy cert
  copy:
    src: /etc/ssl/bopen.bond/cert.cer
    dest: /etc/ssl/bopen.bond/cert.cer
    owner: root
    group: root
    mode: '0644'
  become: yes
